<div class="slice-panel-wrapper" [class.collapsed]="isCollapsed">
  <aside class="slice-panel" [class.collapsed]="isCollapsed">
    <div class="slice-panel-header">
      <button
        *ngIf="showToggle"
        type="button"
        class="slice-toggle"
        [attr.aria-label]="isCollapsed ? 'Déplier le filtre' : 'Replier le filtre'"
        (click)="togglePanel()"
      >
        <span class="slice-toggle-icon">{{ isCollapsed ? '›' : '‹' }}</span>
      </button>
    </div>

    <div class="slice-panel-body" *ngIf="!isCollapsed" #slicePanelBody>
      <ng-container *ngFor="let slice of slices; let si = index; trackBy: trackBySliceIndex">
        <div class="slice-title-row" [attr.data-slice-index]="si" (click)="toggleSliceCollapse(si)">
          <span class="slice-title-chevron" [class.expanded]="!isSliceCollapsed(si)">›</span>
          <p class="slice-title">{{ slice.title || 'Filtrer' }}</p>
          <button
            *ngIf="isSliceDynamic(si)"
            type="button"
            class="slice-remove-btn"
            (click)="$event.stopPropagation(); removeDynamicSlice(si)"
          >×</button>
        </div>

        <div class="slice-section-items" *ngIf="!isSliceCollapsed(si)">
          <ng-container *ngIf="isSliceLoading(si); else sliceContent">
            <div class="slice-lazy-loading">
              <span class="lazy-skeleton"></span>
              <span class="lazy-skeleton"></span>
              <span class="lazy-skeleton"></span>
            </div>
          </ng-container>
          <ng-template #sliceContent>
            <button
              *ngFor="let category of slice.categories; trackBy: trackByCategoryKey"
              class="slice-item"
              type="button"
              [class.active]="isSliceCategoryActive(si, category.key)"
              [attr.data-category-key]="category.key"
              [title]="category.label"
              (click)="onSliceCategorySelected(si, category.key)"
            >
              <span>{{ category.label }}</span>
              <span *ngIf="showCounts">{{ sliceCategoryCount(si, category.key) }}</span>
            </button>
          </ng-template>
        </div>

        <hr *ngIf="si < slices.length - 1" class="slice-divider" />
      </ng-container>
    </div>
  </aside>
</div>
