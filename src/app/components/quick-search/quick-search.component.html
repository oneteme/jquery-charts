<div class="qs-backdrop" *ngIf="isOpen" (click)="onBackdropClick($event)">
  <div class="qs-dialog" role="dialog" aria-modal="true" aria-label="Recherche rapide">

    <div class="qs-input-row">
      <svg class="qs-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        #searchInput
        class="qs-input"
        type="text"
        placeholder="Rechercher une page, un composant, un type de graphique…"
        [value]="query"
        (input)="onQuery($any($event.target).value)"
        autocomplete="off"
        spellcheck="false"
      />
      <kbd class="qs-esc" (click)="close()">Esc</kbd>
    </div>

    <div class="qs-results" *ngIf="results.length > 0">
      <div
        *ngFor="let item of results; let i = index"
        class="qs-item"
        [class.qs-item--active]="i === activeIndex"
        (mouseenter)="activeIndex = i"
        (click)="select(item)"
      >
        <div class="qs-item__body">
          <span class="qs-item__label" [innerHTML]="highlightMatch(item.label)"></span>
          <span class="qs-item__sublabel" *ngIf="item.sublabel">{{ item.sublabel }}</span>
        </div>
        <span class="qs-item__category">{{ item.category }}</span>
        <svg class="qs-item__arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </div>

    <div class="qs-empty" *ngIf="results.length === 0 && query">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Aucun résultat pour « {{ query }} »</span>
    </div>

    <div class="qs-footer">
      <span><kbd>↑↓</kbd> naviguer</span>
      <span><kbd>↵</kbd> ouvrir</span>
      <span><kbd>Esc</kbd> fermer</span>
    </div>

  </div>
</div>
