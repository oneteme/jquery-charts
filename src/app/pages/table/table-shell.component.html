<div class="table-shell">

  <header class="shell-header" *ngIf="!isPresentation">
    <div class="shell-header__top">
      <h1 class="shell-header__title">jquery-table</h1>
      <p class="shell-header__desc">
        Angular Material étendu — recherche, group by, slices, colonnes lazy, préférences.
      </p>
    </div>

    <nav class="tab-bar" aria-label="Sections jquery-table">
      <a
        *ngFor="let tab of tabs"
        class="tab-bar__item"
        [routerLink]="tab.path"
        routerLinkActive="tab-bar__item--active"
        [routerLinkActiveOptions]="{ exact: tab.exact }"
        role="tab"
      >
        <!-- Icônes SVG inline légères selon tab.icon -->
        <svg *ngIf="tab.icon === 'demo'" class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        <svg *ngIf="tab.icon === 'comp'" class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
        </svg>
        <svg *ngIf="tab.icon === 'slice'" class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <svg *ngIf="tab.icon === 'doc'" class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="tab-bar__label">{{ tab.label }}</span>
      </a>
    </nav>
  </header>

  <div class="shell-content">
    <router-outlet></router-outlet>
  </div>

</div>
